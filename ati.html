<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Sao Paulo  Futebol Clube</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color:   #909456; /* Cor para alterar no modo noturno */
            color: #3b3533;               /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background-color: rgb(208, 198, 198); /* Cor para alterar no modo noturno */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #3b3533;
            margin-bottom: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #909456;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            color: #1d1e1e;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>O meu melhor site</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">100%</span>
                <span class="card-label"> porque sao paulo e sentimento que jamais acabara, Se um dia tu nao existir, eu nao quero nunca mais</span>
            </div>
            <div class="card">
                <span class="card-value">100.000 mil pessoas</span>
                <span class="card-label">o tricolor tu e alegria, ooo tricolor eu amo voce como eu te amo tricolor como eu te amo demais</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #ff0800;">
            Socio torcedor: <span style="color:#3b3533(255, 0, 0);">● Online</span>
        </p>
    </div>

</body>
</html>
